services:
  buildkit:
    image: moby/buildkit:latest
    container_name: buildkit
    privileged: true
    restart: unless-stopped
    networks:
      - brimble-net

  caddy:
    image: caddy:2-alpine
    environment:
      - CADDY_SITE_ADDRESS=${CADDY_SITE_ADDRESS}
      - CADDY_ADMIN_LISTEN_ADDR=${CADDY_ADMIN_LISTEN_ADDR}
      - CADDY_BACKEND_UPSTREAM=${CADDY_BACKEND_UPSTREAM}
      - CADDY_FRONTEND_UPSTREAM=${CADDY_FRONTEND_UPSTREAM}
    ports:
      - "${CADDY_HTTP_PORT}:80"
      - "${CADDY_ADMIN_PORT}:2019"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_started
    restart: unless-stopped
    networks:
      - brimble-net

  backend:
    image: bettergreat/brimble-backend:latest
    build:
      context: ./backend
      args:
        APP_UID: ${APP_UID}
        APP_GID: ${APP_GID}
        DOCKER_SOCK_GID: ${DOCKER_SOCK_GID}
        RAILPACK_VERSION: ${RAILPACK_VERSION}
    expose:
      - "${PORT}"
    environment:
      - PORT=${PORT}
      - POSTGRES_URL=${POSTGRES_URL}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - CORS_ORIGIN=${CORS_ORIGIN}
      - RAILPACK_BIN=${RAILPACK_BIN}
      - RAILPACK_BUILD_TIMEOUT_MS=${RAILPACK_BUILD_TIMEOUT_MS}
      - GIT_CLONE_TIMEOUT_MS=${GIT_CLONE_TIMEOUT_MS}
      - BUILDKIT_HOST=${BUILDKIT_HOST}
      - DOCKER_NETWORK=${DOCKER_NETWORK}
      - DEPLOYMENT_BASE_URL=${DEPLOYMENT_BASE_URL}
      - DEPLOYMENT_PORT_MIN=${DEPLOYMENT_PORT_MIN}
      - DEPLOYMENT_PORT_MAX=${DEPLOYMENT_PORT_MAX}
      - CONTAINER_INTERNAL_PORT_PRIMARY=${CONTAINER_INTERNAL_PORT_PRIMARY}
      - CONTAINER_INTERNAL_PORT_FALLBACK=${CONTAINER_INTERNAL_PORT_FALLBACK}
      - CADDY_ADMIN_URL=${CADDY_ADMIN_URL}
      - CADDY_ADMIN_ORIGIN=${CADDY_ADMIN_ORIGIN}
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS \"http://127.0.0.1:$$PORT/ready\" >/dev/null"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 20s
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      postgres:
        condition: service_healthy
      buildkit:
        condition: service_started
    restart: unless-stopped
    networks:
      - brimble-net

  frontend:
    image: bettergreat/brimble-frontend:latest
    environment:
      - API_URL=${API_URL}
    build:
      context: ./frontend
      args:
        API_URL: ${API_URL}
        FRONTEND_APP_UID: ${FRONTEND_APP_UID}
        FRONTEND_APP_GID: ${FRONTEND_APP_GID}
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - brimble-net

  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$POSTGRES_USER\" -d \"$POSTGRES_DB\""]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    volumes:
      - pgdata:/var/lib/postgresql/data
      # Runs *.sql in sort order once, when $PGDATA is empty (first volume use only).
      - ./backend/src/db/migrations:/docker-entrypoint-initdb.d:ro
    networks:
      - brimble-net
    restart: unless-stopped

volumes:
  pgdata:
  caddy_data:

networks:
  brimble-net:
    name: brimble-net
    driver: bridge
